<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Agendador · Setor 1804</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,500;6..12,600;6..12,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f8fa; --surface:#fff; --sidebar-bg:#f2f4f8;
  --border:#dde1ea; --border-lt:#eaecf2;
  --text:#111827; --text2:#4b5563; --text3:#9ca3af;
  --blue:#4285f4; --blue-lt:#e8f0fe; --blue-mid:#c5d8fd;
  --green:#34a853; --green-lt:#d9f5e1;
  --orange:#e8710a; --red:#ea4335; --red-lt:#fce8e6;
  --purple:#7b5ea7; --teal:#0f9d8e;
  --r:8px; --r-full:9999px;
  --sh1:0 1px 3px rgba(66,133,244,.10),0 1px 2px rgba(0,0,0,.06);
  --sh2:0 3px 10px rgba(66,133,244,.12),0 1px 4px rgba(0,0,0,.08);
  --sh3:0 6px 20px rgba(66,133,244,.14),0 2px 8px rgba(0,0,0,.08);
  --sidebar-w:260px;
  --font:'Nunito Sans',sans-serif;
  --font-h:'Nunito',sans-serif;
  --font-m:'Space Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--r-full)}

/* ═══ HEADER ═══ */
.hdr{height:56px;background:var(--surface);border-bottom:1.5px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100;box-shadow:var(--sh1)}
.hdr-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hdr-title{font-family:var(--font-h);font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.02em}
.hdr-badge{font-family:var(--font);font-size:11px;font-weight:600;background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-mid);border-radius:var(--r-full);padding:2px 10px}
.week-title-input{border:none;outline:none;background:transparent;font-family:var(--font-h);font-size:17px;font-weight:800;color:var(--text);width:360px;max-width:480px;padding:4px 10px;border-radius:6px;border:1.5px dashed transparent;transition:all .15s}
.week-title-input::placeholder{color:var(--text3);font-weight:500;font-size:14px}
.week-title-input:hover{border-color:var(--border);background:var(--bg)}
.week-title-input:focus{border-color:var(--blue);background:#fff}
.zoom-bar{display:flex;align-items:center;gap:3px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-full);padding:2px 4px}
.zoom-btn{width:32px;height:32px;border:none;border-radius:var(--r-full);background:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--text2);transition:all .12s;font-family:var(--font-h);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.zoom-btn:hover{background:var(--blue-lt);color:var(--blue)}
.zoom-val{font-family:var(--font-m);font-size:10px;font-weight:700;color:var(--text2);min-width:32px;text-align:center}
.week-pills{margin-left:auto;display:flex;background:var(--bg);border-radius:var(--r-full);padding:3px;gap:2px;border:1.5px solid var(--border)}
.wp{font-family:var(--font-h);font-size:11px;font-weight:700;padding:7px 14px;border-radius:var(--r-full);border:none;background:0;color:var(--text2);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.wp:hover{background:var(--blue-lt);color:var(--blue)}
.wp.on{background:var(--blue);color:#fff;box-shadow:0 2px 6px rgba(66,133,244,.4)}

/* ═══ STATS ═══ */
.stats{background:var(--surface);border-bottom:1.5px solid var(--border);display:flex;overflow-x:auto}
.st{display:flex;align-items:center;gap:7px;padding:0 16px;height:36px;font-size:12px;font-weight:600;color:var(--text2);border-right:1px solid var(--border-lt);white-space:nowrap;flex-shrink:0}
.st strong{font-family:var(--font-m);font-size:12px;font-weight:700;color:var(--text)}
.st-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ═══ BODY ═══ */
.body{display:flex;height:calc(100vh - 92px);overflow:hidden}

/* ═══ SIDEBAR ═══ */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar-bg);border-right:1.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .22s,min-width .22s;flex-shrink:0;position:relative;z-index:20}
.sidebar.collapsed{width:0!important;min-width:0!important;border-right:none}
.sidebar.collapsed .sb-inner{opacity:0;pointer-events:none}
.sb-inner{display:flex;flex-direction:column;flex:1;overflow:hidden;transition:opacity .15s;min-width:var(--sidebar-w)}
.sb-toggle-fixed{position:fixed;left:260px;top:50%;transform:translateY(-50%);z-index:120;width:16px;height:44px;background:var(--blue);border:none;border-radius:0 6px 6px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;transition:left .25s cubic-bezier(.4,0,.2,1),background .14s;box-shadow:2px 0 6px rgba(66,133,244,.25);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.sb-toggle-fixed:hover{background:#2a75f3}
.sb-toggle-fixed:active{transform:translateY(-50%) scale(.92)}
.sb-toggle-fixed #sbToggleArrow{display:block;line-height:1;font-size:9px}
.sb-top{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sb-lbl{font-family:var(--font-h);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.sb-hide-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);transition:all .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.sb-hide-btn:hover{background:var(--red-lt);border-color:var(--red);color:var(--red)}
.sb-hide-btn:active{background:var(--red);color:#fff}
.sb-badge{font-family:var(--font-m);font-size:10px;font-weight:700;background:var(--blue);color:#fff;border-radius:var(--r-full);padding:2px 8px}
.sb-search{margin:8px 10px 6px;display:flex;align-items:center;gap:6px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-full);padding:0 12px;height:36px;transition:border-color .15s}
.sb-search:focus-within{border-color:var(--blue)}
.sb-search input{flex:1;border:none;background:0;font-family:var(--font);font-size:12px;font-weight:500;color:var(--text);outline:none}
.sb-search input::placeholder{color:var(--text3)}
.sb-chips{padding:4px 10px 8px;display:flex;flex-wrap:wrap;gap:4px;border-bottom:1px solid var(--border)}
.chip{font-family:var(--font-h);font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--r-full);border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .12s;text-transform:uppercase}
.chip:hover{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}

.doc-list{flex:1;overflow-y:auto;padding:6px 8px}
.doc-card{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);margin-bottom:3px;cursor:grab;border:1.5px solid transparent;background:var(--surface);box-shadow:var(--sh1);transition:all .14s;user-select:none;touch-action:none}
.doc-card:hover{border-color:var(--blue-mid);box-shadow:var(--sh2);transform:translateY(-1px)}
.doc-card:active{transform:scale(.97)}
.doc-card.dragging{opacity:.2;transform:scale(.95)}
.doc-card.sched{background:var(--blue-lt);border-color:var(--blue-mid)}
.doc-card.visited .dc-n{font-weight:800;color:var(--green)}
.doc-card .edit-btn{width:28px;height:28px;border-radius:50%;background:var(--blue-lt);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--blue);flex-shrink:0;opacity:1;transition:background .12s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.doc-card .edit-btn:hover{background:var(--blue-mid);color:var(--blue)}
.doc-card .edit-btn:active{background:var(--blue);color:#fff;transform:scale(.9)}
.sp-tag{width:32px;min-width:32px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:9px;font-weight:800;flex-shrink:0}
.dc-i{flex:1;min-width:0}
.dc-n{font-family:var(--font-h);font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);line-height:1.3}
.dc-s{font-family:var(--font);font-size:11px;font-weight:500;color:var(--text3);display:flex;align-items:center;gap:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dc-ld{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.dc-vd{width:18px;height:18px;border-radius:50%;background:var(--green);flex-shrink:0;display:none;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:900;box-shadow:0 1px 4px rgba(52,168,83,.4)}
.doc-card.visited .dc-vd{display:flex}
.dc-ag-inline{font-family:var(--font-h);font-size:11px;font-weight:800;color:var(--green);margin-left:3px;white-space:nowrap}
.doc-card.agendado-card{border-left:3px solid var(--blue)}
.doc-card.agendado-card .dc-n{font-weight:800}
.ag-btn{padding:1px 6px;border-radius:var(--r-full);font-family:var(--font-h);font-size:8px;font-weight:800;cursor:pointer;border:1.5px solid;transition:all .12s;letter-spacing:.03em;text-transform:uppercase;line-height:1.5;flex-shrink:0}
.ag-yes{background:var(--green-lt);border-color:var(--green);color:var(--green)}
.ag-yes:hover{background:var(--green);color:#fff}
.ag-no{background:transparent;border-color:var(--border);color:var(--text3)}
.ag-no:hover{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}

/* Agendado toggle row inside dialog */
.ag-toggle-row{display:flex;gap:0;border-radius:var(--r);overflow:hidden;border:1.5px solid var(--border)}
.ag-toggle-btn{flex:1;padding:10px 0;font-family:var(--font-h);font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .15s;background:var(--bg);color:var(--text3);letter-spacing:.02em}
.ag-toggle-btn:first-child{border-right:1px solid var(--border)}
.ag-toggle-btn.active-no{background:var(--red-lt);color:var(--red);font-weight:800}
.ag-toggle-btn.active-yes{background:var(--green-lt);color:var(--green);font-weight:800}
.ag-toggle-btn:hover{opacity:.85}
.sb-btns{border-top:1px solid var(--border);padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.fab{height:38px;border:none;border-radius:var(--r-full);font-family:var(--font-h);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .14s}
.fab-primary{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(66,133,244,.4)}
.fab-primary:hover{background:#2a75f3;box-shadow:var(--sh3)}
.fab-outline{background:var(--surface);color:var(--blue);border:1.5px solid var(--blue)}
.fab-outline:hover{background:var(--blue-lt)}

/* ═══ GRID ═══ */
.grid-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.grid-wrap{flex:1;overflow:auto;background:var(--bg);min-height:0}
table.grid{border-collapse:collapse;table-layout:fixed;width:100%;min-width:700px}
table.grid thead th{position:sticky;top:0;z-index:10;background:#f0f2f5;border-bottom:2px solid var(--blue);padding:9px 8px;font-family:var(--font-h);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);text-align:left}
table.grid thead th:first-child{width:52px;text-align:center;background:#e9ebef;font-size:9px;color:var(--text3)}
table.grid td{border:1px solid var(--border-lt);min-height:42px;height:auto;vertical-align:top;padding:2px;position:relative}
table.grid td.tc{background:#f0f2f5;text-align:center;font-family:var(--font-m);font-size:10px;font-weight:700;color:var(--text2);vertical-align:middle;position:sticky;left:0;z-index:5;border-right:1.5px solid var(--border)}
tr.half .tc{font-size:9px;color:var(--text3);font-weight:400}
table.grid tbody tr:nth-child(even) td:not(.tc){background:rgba(245,247,252,.6)}
table.grid td.dz.over{background:var(--blue-lt)!important;outline:2px dashed var(--blue);outline-offset:-2px}

/* ═══ APPT ═══ */
.appt{border-radius:5px;border-left:3px solid;padding:3px 5px 3px 6px;display:flex;align-items:flex-start;gap:3px;cursor:grab;user-select:none;overflow:visible;transition:filter .12s,box-shadow .12s;box-shadow:0 1px 2px rgba(0,0,0,.07);touch-action:none}
.appt:hover{filter:brightness(.93);box-shadow:var(--sh2)}
.appt:hover .appt-acts{opacity:1}
.appt.visited-a{opacity:1;border-left-width:4px}
.appt.visited-a .appt-nm{font-weight:900}
.appt.dragging-a{opacity:.15}
.appt-body{flex:1;min-width:0}
.appt-nm{font-family:var(--font-h);font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.appt-mt{font-family:var(--font);font-size:8px;font-weight:600;opacity:.65;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appt-obs{font-family:var(--font);font-size:8px;font-weight:500;font-style:italic;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;cursor:text}
.appt-obs:empty::before{content:'+ obs...';opacity:.5}
.appt-ck{width:18px;height:18px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:900;flex-shrink:0;margin-top:0;box-shadow:0 1px 4px rgba(52,168,83,.4)}
.appt-acts{position:absolute;right:2px;top:2px;display:flex;gap:3px;opacity:1;transition:opacity .12s}
.appt-b{width:26px;height:26px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;transition:all .1s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.b-ok{background:rgba(52,168,83,.15);color:var(--green)}.b-ok:hover{background:var(--green);color:#fff}
.b-rm{background:rgba(234,67,53,.10);color:var(--red)}.b-rm:hover{background:var(--red);color:#fff}
.pdv-lbl{font-family:var(--font-h);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}

/* ═══ LEGEND ═══ */
.legend{background:var(--surface);padding:0;overflow-x:auto;overflow-y:hidden;flex-shrink:0;border-top:1.5px solid var(--border)}
.legend-grid{display:grid;grid-template-columns:repeat(4,1fr);width:100%;min-width:700px}
.legend-cell{display:flex;align-items:center;justify-content:center;padding:3px 6px;font-family:var(--font-h);font-size:10px;font-weight:800;text-align:center;letter-spacing:.01em;border:1px solid rgba(0,0,0,.1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ═══ DIALOGS ═══ */
.scrim{position:fixed;inset:0;background:rgba(20,24,60,.38);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.scrim.open{opacity:1;pointer-events:all}
.dlg{background:var(--surface);border-radius:20px;padding:24px;width:400px;max-width:94vw;max-height:90vh;overflow-y:auto;transform:scale(.92) translateY(12px);transition:transform .24s cubic-bezier(.34,1.5,.64,1);box-shadow:var(--sh3);border:1.5px solid var(--border)}
.scrim.open .dlg{transform:scale(1) translateY(0)}
.dlg h3{font-family:var(--font-h);font-size:18px;font-weight:800;margin-bottom:4px}
.dlg-sub{font-size:12px;color:var(--text3);margin-bottom:18px}
.fld{margin-bottom:12px}
.fld label{font-family:var(--font-h);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);display:block;margin-bottom:4px}
.fld input,.fld select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:9px 11px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text);outline:none;transition:border-color .15s}
.fld input:focus,.fld select:focus{border-color:var(--blue)}
.fld select option{background:var(--surface)}
.dlg-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn-g{font-family:var(--font-h);font-size:13px;font-weight:700;padding:12px 20px;border-radius:var(--r-full);border:1.5px solid var(--border);background:0;color:var(--text2);cursor:pointer;transition:all .14s}
.btn-g:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.btn-f{font-family:var(--font-h);font-size:13px;font-weight:800;padding:12px 24px;border-radius:var(--r-full);border:none;background:var(--blue);color:#fff;cursor:pointer;box-shadow:0 2px 6px rgba(66,133,244,.35);transition:all .14s}
.btn-f:hover{background:#2a75f3}
.btn-d{font-family:var(--font-h);font-size:13px;font-weight:700;padding:12px 18px;border-radius:var(--r-full);border:1.5px solid var(--red);background:0;color:var(--red);cursor:pointer;margin-right:auto;transition:all .14s}
.btn-d:hover{background:var(--red-lt)}
.color-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.csw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;outline:2px solid transparent;outline-offset:2px;transition:transform .1s}
.csw:hover{transform:scale(1.15)}
.csw.on{border-color:var(--surface);outline-color:currentColor;transform:scale(1.1)}
.locals-list{max-height:200px;overflow-y:auto;margin-top:10px}
.loc-row{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--border-lt);font-size:12px;font-weight:600}
.loc-pip{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.loc-nm{flex:1;color:var(--text)}
.loc-del{color:var(--red);cursor:pointer;opacity:.5;font-size:11px}.loc-del:hover{opacity:1}

/* Context menu */
.ctx{position:fixed;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:5px;min-width:180px;box-shadow:var(--sh3);z-index:300}
.ctx-l{font-family:var(--font-h);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:4px 12px 2px}
.ctx-s{height:1px;background:var(--border-lt);margin:3px 0}
.ctx-i{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text);transition:background .1s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ctx-i:hover{background:var(--blue-lt);color:var(--blue)}
.ctx-i.bad:hover{background:var(--red-lt);color:var(--red)}
.ctx-i.ok:hover{background:var(--green-lt);color:var(--green)}

/* Snack */
.snack{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;font-family:var(--font-h);font-size:13px;font-weight:700;padding:10px 20px;border-radius:var(--r-full);box-shadow:var(--sh3);z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.snack.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Touch ghost */
.touch-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.8;transform:scale(1.05) rotate(-1deg)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">📋</div>
  <div class="hdr-title">Agendador de Visitas</div>
  <span class="hdr-badge">Setor 1804</span>
  <input class="week-title-input" id="weekTitle" placeholder="Título da semana…" maxlength="60" oninput="saveTitle()">
  <div class="zoom-bar">
    <button class="zoom-btn" onclick="zoomChange(-1)">−</button>
    <span class="zoom-val" id="zoomLbl">100%</span>
    <button class="zoom-btn" onclick="zoomChange(+1)">+</button>
    <button class="zoom-btn" onclick="zoomFit()" title="Caber tudo">⊞</button>
  </div>
  <div class="week-pills" id="weekPills"></div>
</div>

<div class="stats" id="stats"></div>

<div class="body">
  <aside class="sidebar" id="sidebar">
    
    <div class="sb-inner">
      <div class="sb-top">
        <span class="sb-lbl">Médicos</span>
        <div style="display:flex;align-items:center;gap:6px">

let tGhost=null,tDocId=null,tAId=null,tAKey=null;
function tStart(e,docId){e.preventDefault();tDocId=docId;tAId=null;tAKey=null;const t=e.touches[0];const el=e.currentTarget;mkGhost(el,t.clientX,t.clientY);el.classList.add('dragging');document.addEventListener('touchmove',tMove,{passive:false});document.addEventListener('touchend',tEnd);}
function tStartAppt(e,aid,key,docId){e.preventDefault();e.stopPropagation();tAId=aid;tAKey=key;tDocId=docId;const t=e.touches[0];mkGhost(e.currentTarget,t.clientX,t.clientY);e.currentTarget.classList.add('dragging-a');document.addEventListener('touchmove',tMove,{passive:false});document.addEventListener('touchend',tEnd);}
function mkGhost(src,x,y){if(tGhost)tGhost.remove();const g=src.cloneNode(true);g.className='touch-ghost';g.style.width=src.offsetWidth+'px';g.style.height=src.offsetHeight+'px';g.style.left=(x-src.offsetWidth/2)+'px';g.style.top=(y-20)+'px';g.style.position='fixed';document.body.appendChild(g);tGhost=g;}
function tMove(e){e.preventDefault();const t=e.touches[0];if(tGhost){tGhost.style.left=(t.clientX-tGhost.offsetWidth/2)+'px';tGhost.style.top=(t.clientY-20)+'px';}document.querySelectorAll('.dz.over').forEach(c=>c.classList.remove('over'));if(tGhost)tGhost.style.display='none';const el=document.elementFromPoint(t.clientX,t.clientY);if(tGhost)tGhost.style.display='';if(el){const td=el.closest('.dz');if(td)td.classList.add('over');}}
function tEnd(e){document.removeEventListener('touchmove',tMove);document.removeEventListener('touchend',tEnd);if(tGhost){tGhost.remove();tGhost=null;}document.querySelectorAll('.dz.over').forEach(c=>c.classList.remove('over'));document.querySelectorAll('.dragging,.dragging-a').forEach(c=>{c.classList.remove('dragging');c.classList.remove('dragging-a');});
const t=e.changedTouches[0];const el=document.elementFromPoint(t.clientX,t.clientY);const td=el&&el.closest('.dz');
if(!td){tDocId=null;tAId=null;tAKey=null;return;}
const di=parseInt(td.dataset.di),time=td.dataset.time,key=ck(di,time);
if(tAId&&tAKey&&tAKey!==key){const arr=sched[curW][tAKey];const i=arr?arr.findIndex(a=>a.id===tAId):-1;if(i!==-1){const[m]=arr.splice(i,1);if(!arr.length)delete sched[curW][tAKey];(sched[curW][key]=sched[curW][key]||[]).push(m);save();renderAll();snack('📅 Reagendado');}}
else if(tDocId&&!tAId){const doc=doctors.find(x=>x.id===tDocId);if(!doc)return;const id='a'+Date.now()+Math.random().toString(36).slice(2,5);(sched[curW][key]=sched[curW][key]||[]).push({doctorId:doc.id,id,obs:''});save();renderAll();snack(`✓ ${doc.name} agendado`);}
tDocId=null;tAId=null;tAKey=null;}

tr.appendChild(td);});body.appendChild(tr);});}

const flr=doc.floor?` (${doc.floor})`:'';const meta=loc?(loc.name.length>22?loc.name.slice(0,22)+'…':loc.name):doc.spec;
const d=document.createElement('div');d.className='appt'+(vis?' visited-a':'');d.style.borderLeftColor=mc;d.style.background=bg;d.draggable=true;
d.innerHTML=`<div class="appt-body"><div class="appt-nm" style="color:${tc}">${doc.name}${flr}</div><div class="appt-mt" style="color:${tc}">${meta}${agendado[curW].has(doc.id)?' · <span style="color:var(--green);font-weight:800">Agendado ✓</span>':''}</div><div class="appt-obs" contenteditable="true" title="Clique para adicionar observação" data-aid="${aid}" data-key="${key}">${obs}</div></div>${vis?'<div class="appt-ck">✓</div>':''}<div class="appt-acts"><button class="appt-b b-ok" title="${vis?'Desmarcar':'Visitado'}">${vis?'↩':'✓'}</button><button class="appt-b b-rm" title="Remover">✕</button></div>`;
// Check button - mouse + touch
const btnOk=d.querySelector('.b-ok');
btnOk.onclick=e=>{e.stopPropagation();togVis(doc.id);};
btnOk.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();togVis(doc.id);},{passive:false});
btnOk.addEventListener('touchstart',e=>{e.stopPropagation();},{passive:false});
// Remove button - mouse + touch
const btnRm=d.querySelector('.b-rm');
btnRm.onclick=e=>{e.stopPropagation();rmAppt(key,aid);};
btnRm.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();rmAppt(key,aid);},{passive:false});
btnRm.addEventListener('touchstart',e=>{e.stopPropagation();},{passive:false});
d.querySelector('.appt-obs').addEventListener('blur',function(ev){ev.stopPropagation();const a=sched[curW][key];if(!a)return;const ap=a.find(x=>x.id===aid);if(ap){ap.obs=this.textContent.trim();save();}});
d.querySelector('.appt-obs').addEventListener('keydown',function(ev){if(ev.key==='Enter'){ev.preventDefault();this.blur();}ev.stopPropagation();});
d.querySelector('.appt-obs').addEventListener('mousedown',function(ev){ev.stopPropagation();});
d.querySelector('.appt-obs').addEventListener('touchstart',function(ev){ev.stopPropagation();},{passive:false});
d.addEventListener('dragstart',e=>{dragAId=aid;dragAKey=key;dragDoc=null;d.classList.add('dragging-a');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',aid);});
d.addEventListener('dragend',()=>{dragAId=null;dragAKey=null;d.classList.remove('dragging-a');});
d.addEventListener('touchstart',e=>tStartAppt(e,aid,key,doc.id),{passive:false});
d.addEventListener('contextmenu',e=>{e.preventDefault();ctxAppt(e,doc,aid,key);});
return d;}

function togAg(id,e){if(e)e.stopPropagation();if(agendado[curW].has(id)){agendado[curW].delete(id);snack('Agendamento removido');}else{agendado[curW].add(id);snack('📋 Médico agendado!');}save();rDocList();}
function setAgToggle(val){window._agValue=val;updateAgToggle();}
function updateAgToggle(){const y=document.getElementById('agYes'),n=document.getElementById('agNo');
y.className='ag-toggle-btn'+(window._agValue?' active-yes':'');
n.className='ag-toggle-btn'+(window._agValue?'':' active-no');}
function togVis(id){if(vW[curW].has(id)){vW[curW].delete(id);if(!Object.values(vW).some(s=>s.has(id)))vG.delete(id);snack('↩ Desmarcado');}else{vW[curW].add(id);vG.add(id);snack('✅ Visitado!');}save();renderAll();}
function rmAppt(key,id){if(!sched[curW][key])return;sched[curW][key]=sched[curW][key].filter(a=>a.id!==id);if(!sched[curW][key].length)delete sched[curW][key];save();renderAll();snack('🗑 Removido');}

// ═══ LEGEND ═══
function rLegend(){
  const grid = locals.map(loc=>{
    const {r,g,b}=hexRGB(loc.color);
    const lum=(0.299*r+0.587*g+0.114*b)/255;
    const txtColor=lum>0.55?'#111':'#fff';
    return `<div class="legend-cell" style="background:${loc.color};color:${txtColor}">${loc.name}</div>`;
  }).join('');
  document.getElementById('legend').innerHTML=`<div class="legend-grid">${grid}</div>`;
}

// ═══ ZOOM ═══
const ZS=[40,50,60,70,80,90,100,110,120,130,150];let zIdx=ZS.indexOf(100);
function applyZ(){const tbl=document.getElementById('gridTbl');if(!tbl)return;tbl.style.zoom=ZS[zIdx]/100;document.getElementById('zoomLbl').textContent=ZS[zIdx]+'%';}
function zoomChange(dir){zIdx=Math.max(0,Math.min(ZS.length-1,zIdx+dir));applyZ();}
function zoomFit(){const o=document.getElementById('gridWrap'),t=document.getElementById('gridTbl');if(!o||!t)return;t.style.zoom=1;const zH=o.clientHeight/t.scrollHeight,zW=o.clientWidth/t.scrollWidth;const pct=Math.round(Math.min(zH,zW,1)*100);let b=0;ZS.forEach((s,i)=>{if(s<=pct)b=i;});zIdx=b;applyZ();}

// ═══ CONTEXT MENUS ═══
function ctxDoc(e,doc){const vis=vG.has(doc.id);buildCtx(e,[{t:'l',x:doc.name+(doc.floor?` (${doc.floor})`:'')} ,{t:'s'},{t:'i',x:vis?'↩ Desmarcar visitado':'✅ Marcar visitado',cls:'ok',fn:()=>togVis(doc.id)},{t:'i',x:'✏️ Editar',fn:()=>openEditDoc(doc.id)},{t:'s'},{t:'i',x:'🗑 Remover',cls:'bad',fn:()=>confirmDel(doc.id)}]);}
function ctxAppt(e,doc,aid,key){const vis=vW[curW].has(doc.id);buildCtx(e,[{t:'l',x:doc.name+(doc.floor?` (${doc.floor})`:'')} ,{t:'s'},{t:'i',x:vis?'↩ Desmarcar':'✅ Marcar visitado',cls:'ok',fn:()=>togVis(doc.id)},{t:'i',x:'✏️ Editar médico',fn:()=>openEditDoc(doc.id)},{t:'s'},{t:'i',x:'✕ Remover do horário',cls:'bad',fn:()=>rmAppt(key,aid)}]);}
function buildCtx(e,items){const m=document.getElementById('ctx');m.innerHTML=items.map(i=>{if(i.t==='l')return`<div class="ctx-l">${i.x}</div>`;if(i.t==='s')return`<div class="ctx-s"></div>`;return`<div class="ctx-i ${i.cls||''}" data-k="${btoa(i.x)}">${i.x}</div>`;}).join('');
items.filter(i=>i.t==='i'&&i.fn).forEach(i=>{const el=m.querySelector(`[data-k="${btoa(i.x)}"]`);if(el)el.onclick=()=>{i.fn();m.style.display='none';};});
m.style.display='block';m.style.left=e.pageX+'px';m.style.top=e.pageY+'px';
requestAnimationFrame(()=>{const r=m.getBoundingClientRect();if(r.right>window.innerWidth)m.style.left=(e.pageX-r.width)+'px';if(r.bottom>window.innerHeight)m.style.top=(e.pageY-r.height)+'px';});}
document.addEventListener('click',()=>document.getElementById('ctx').style.display='none');

// ═══ DIALOGS ═══
function openDlg(id){document.getElementById(id).classList.add('open');}
function closeDlg(id){document.getElementById(id).classList.remove('open');if(id==='locScrim')window._editLoc=null;}
function popSpec(){document.getElementById('dSpec').innerHTML=Object.keys(SP).map(k=>`<option value="${k}">${k}</option>`).join('');}
function popLoc(){document.getElementById('dLocal').innerHTML='<option value="">— Nenhum —</option>'+locals.map(l=>`<option value="${l.id}">${l.name}</option>`).join('');}

function openAddDoc(){editId=null;document.getElementById('docTitle').textContent='Adicionar Médico';document.getElementById('docSub').textContent='Preencha os dados';document.getElementById('dName').value='';document.getElementById('dFloor').value='';document.getElementById('docDel').style.display='none';document.getElementById('agField').style.display='none';popSpec();popLoc();openDlg('docScrim');setTimeout(()=>document.getElementById('dName').focus(),250);}
function openEditDoc(id,e){if(e)e.stopPropagation();const doc=doctors.find(x=>x.id===id);if(!doc)return;editId=id;document.getElementById('docTitle').textContent='Editar Médico';document.getElementById('docSub').textContent=doc.name;document.getElementById('dName').value=doc.name;document.getElementById('dFloor').value=doc.floor||'';document.getElementById('docDel').style.display='inline-flex';popSpec();popLoc();document.getElementById('dSpec').value=doc.spec;document.getElementById('dLocal').value=doc.localId||'';
document.getElementById('agField').style.display='block';
window._agValue=agendado[curW].has(id);updateAgToggle();
openDlg('docScrim');}
function saveDoc(){const nm=document.getElementById('dName').value.trim().toUpperCase();const fl=document.getElementById('dFloor').value.trim();const spec=document.getElementById('dSpec').value;const lid=document.getElementById('dLocal').value;if(!nm){snack('⚠️ Nome obrigatório');return;}
if(editId){const d=doctors.find(x=>x.id===editId);if(d){d.name=nm;d.floor=fl;d.spec=spec;d.localId=lid;}
if(window._agValue)agendado[curW].add(editId);else agendado[curW].delete(editId);
snack('✏️ Atualizado');}else{doctors.push({id:'d_'+Date.now(),name:nm,floor:fl,spec,localId:lid});snack('➕ Adicionado');}closeDlg('docScrim');save();renderAll();}
function delDoc(){closeDlg('docScrim');if(editId)confirmDel(editId);}
function confirmDel(id){const doc=doctors.find(x=>x.id===id);if(!doc)return;if(!confirm(`Remover "${doc.name}"?`))return;doctors=doctors.filter(x=>x.id!==id);for(let w=0;w<TW;w++){Object.keys(sched[w]).forEach(k=>{sched[w][k]=sched[w][k].filter(a=>a.doctorId!==id);if(!sched[w][k].length)delete sched[w][k];});vW[w].delete(id);}vG.delete(id);save();renderAll();snack('🗑 Removido');}

// locals dialog
function buildCGrid(){document.getElementById('cGrid').innerHTML=PAL.map(c=>`<div class="csw${c===selC?' on':''}" style="background:${c};outline-color:${c}" onclick="selC='${c}';buildCGrid()"></div>`).join('');}
function openLocDlg(){selC=PAL[0];buildCGrid();rLocsList();popLoc();openDlg('locScrim');}
function rLocsList(){const el=document.getElementById('locsList');el.innerHTML=locals.length?locals.map(l=>`<div class="loc-row"><div class="loc-pip" style="background:${l.color}"></div><div class="loc-nm">${l.name}</div><span class="loc-del" onclick="delLoc('${l.id}')">✕</span></div>`).join(''):'<div style="padding:10px 0;font-size:12px;color:var(--text3)">Nenhum local</div>';}
function addLoc(){const n=document.getElementById('lName').value.trim().toUpperCase();if(!n){snack('⚠️ Nome obrigatório');return;}
if(window._editLoc){const l=locals.find(x=>x.id===window._editLoc);if(l){l.name=n;l.color=selC;}window._editLoc=null;snack('✏️ Local atualizado');}else{locals.push({id:'l_'+Date.now(),name:n,color:selC});snack('📍 Local adicionado');}
document.getElementById('lName').value='';save();rLocsList();popLoc();rLegend();rDocList();rGrid();}
function delLoc(id){locals=locals.filter(l=>l.id!==id);doctors.forEach(d=>{if(d.localId===id)d.localId='';});save();rLocsList();renderAll();}

// search
document.getElementById('searchIn').addEventListener('input',e=>{q=e.target.value;rDocList();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDlg('docScrim');closeDlg('locScrim');}if(e.key==='Enter'&&document.getElementById('docScrim').classList.contains('open'))saveDoc();});
['docScrim','locScrim'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target===document.getElementById(id))closeDlg(id);});});

// render all
function renderAll(){rPills();rStats();rChips();rDocList();rGrid();rLegend();requestAnimationFrame(()=>{applyZ();positionToggleBtn();});}
load();renderAll();setTimeout(()=>{zoomFit();positionToggleBtn();},150);window.addEventListener('resize',positionToggleBtn);
</script>
</body>
</html>
